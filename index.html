<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebAR Construction Pole - 工事用ポール配置</title>
    <link rel="stylesheet" href="style.css">
    <!-- Google Fonts: Outfit for a premium look -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    
    <!-- Import Map for Three.js -->
    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/examples/jsm/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
    </script>
</head>
<body>
    <div id="ui-overlay">
        <div id="top-ui">
            <div id="instructions" class="glass">
                <p id="instruction-text">床をスキャンしてください...</p>
            </div>
        </div>

        <div id="controls">
            <button id="reset-btn" class="glass-btn small" title="すべて消去">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
                <span>リセット</span>
            </button>

            <button id="undo-btn" class="glass-btn" title="1本戻る">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 14 4 9l5-5"/><path d="M4 9h11a4 4 0 0 1 0 8h-1"/></svg>
                <span>1本戻る</span>
            </button>
            
            <button id="screenshot-helper-btn" class="glass-btn primary" title="スクリーンショット">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:32px; height:32px; color: white;"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
                <span>全画面</span>
            </button>
        </div>
        <div id="screenshot-instruction" class="hidden">
            <p>本体のボタンを使って<br>スクリーンショットを撮ってください</p>
            <button id="ui-show-btn">元に戻す</button>
        </div>

        <div id="version-badge">Ver 2.2</div>
    </div>

    <!-- AR Start Button: This container holds the button to initiate the WebXR AR session -->
    <div id="ar-start-container">
        <button id="start-ar-btn">ARを開始する</button>
    </div>

    <script type="module" src="main.js"></script>
</body>
</html>
